name: Deploy Marelune Bali to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        working-directory: Production-Code
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ "${{ vars.USE_CUSTOM_DOMAIN }}" = "true" ] || [ "$REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            BASE_PATH=""
          else
            BASE_PATH="/$REPO_NAME"
          fi
          echo "Using BASE_PATH=$BASE_PATH"
          BASE_PATH="$BASE_PATH" node build.mjs
          touch dist/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Production-Code/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
