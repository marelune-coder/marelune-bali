name: Deploy Marelune Bali to GitHub Pages

on:
  # Run on push to main branch
  push:
    branches:
      - main
  # Allow manual trigger from Actions tab
  workflow_dispatch:
  # Run on pull request for preview
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Node.js with caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Production-Code/package-lock.json

      # Install dependencies
      - name: Install dependencies
        working-directory: Production-Code
        run: npm ci

      # Determine BASE_PATH for GitHub Pages subdirectory support
      - name: Set BASE_PATH
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          # Use root for custom domain or user/org pages, else subdirectory
          if [ "${{ vars.USE_CUSTOM_DOMAIN }}" = "true" ] || [ "$REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            echo "BASE_PATH=" >> $GITHUB_ENV
          else
            echo "BASE_PATH=/$REPO_NAME" >> $GITHUB_ENV
          fi
          echo "Using BASE_PATH: ${{ env.BASE_PATH }}"

      # Build static site
      - name: Build static site
        working-directory: Production-Code
        run: node build.mjs

      # Create .nojekyll for GitHub Pages
      - name: Enable GitHub Pages
        run: touch Production-Code/dist/.nojekyll

      # Upload artifact for deployment
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: Production-Code/dist

  # Deploy to GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
