# ============================================================
# MARELUNE BALI - CMS Configuration
# ============================================================
# Version: 8.0 - Simplified & Compatible
# ============================================================

media:
  input: public/uploads
  output: /uploads

content:

  # ============================================================
  # SITE SETTINGS
  # ============================================================
  - name: site
    label: Site Settings
    type: file
    path: content/site.json
    fields:
      - { name: brand, label: Brand Name, type: string }
      - { name: domain, label: Domain URL, type: string }
      - { name: description, label: Site Description, type: text }
      - { name: logo, label: Logo URL, type: image }
      - { name: contact_email, label: Contact Email, type: string }
      - { name: contact_phone, label: Contact Phone, type: string }
      - { name: contact_whatsapp, label: WhatsApp Number, type: string }
      - { name: contact_location, label: Location, type: string }
      - { name: seoKeywords, label: SEO Keywords, type: text }

  # ============================================================
  # HOME PAGE
  # ============================================================
  - name: home
    label: Home Page
    type: file
    path: content/pages/home.json
    fields:
      - { name: title, label: SEO Title, type: string }
      - { name: description, label: SEO Description, type: text }
      - { name: hero_title, label: Hero Title, type: string }
      - { name: hero_subtitle, label: Hero Subtitle, type: text }
      - { name: hero_ctaLabel, label: Hero CTA Text, type: string }
      - { name: hero_ctaHref, label: Hero CTA Link, type: string }
      - { name: hero_image, label: Hero Image, type: image }

  # ============================================================
  # JOURNEYS
  # ============================================================
  - name: journeys
    label: Journeys
    type: collection
    path: content/journeys
    filename: "{fields.slug}.json"
    fields:
      - { name: title, label: Journey Title, type: string }
      - { name: slug, label: URL Slug, type: string }
      - { name: order, label: Display Order, type: number }
      - { name: location, label: Location, type: string }
      - { name: summary, label: Short Summary, type: text }
      - { name: description, label: Full Description, type: text }
      - { name: price, label: Starting Price, type: string }
      - { name: duration, label: Duration, type: string }
      - { name: idealFor, label: Ideal For, type: string }
      - { name: transport, label: Transport Type, type: string }
      - { name: image, label: Hero Image, type: image }
      - { name: highlights, label: Highlights, type: string, list: true }
      - { name: isActive, label: Active, type: boolean }

  # ============================================================
  # JOURNAL ARTICLES
  # ============================================================
  - name: journal
    label: Journal Articles
    type: collection
    path: content/blog
    filename: "{fields.slug}.md"
    fields:
      - { name: title, label: Article Title, type: string }
      - { name: slug, label: URL Slug, type: string }
      - { name: description, label: Meta Description, type: text }
      - { name: category, label: Category, type: string }
      - { name: date, label: Publish Date, type: date }
      - { name: readingTime, label: Reading Time, type: string }
      - { name: thumbnail, label: Featured Image, type: image }
      - { name: body, label: Article Content, type: rich-text }

  # ============================================================
  # ABOUT PAGE
  # ============================================================
  - name: about
    label: About Page
    type: file
    path: content/pages/about.json
    fields:
      - { name: title, label: SEO Title, type: string }
      - { name: description, label: SEO Description, type: text }
      - { name: hero_title, label: Hero Title, type: string }
      - { name: hero_subtitle, label: Hero Subtitle, type: string }
      - { name: hero_image, label: Hero Image, type: image }
      - { name: story_title, label: Story Title, type: text }
      - { name: story_body, label: Story Content, type: text }

  # ============================================================
  # BOOKING PAGE
  # ============================================================
  - name: book
    label: Booking Page
    type: file
    path: content/pages/book.json
    fields:
      - { name: title, label: SEO Title, type: string }
      - { name: description, label: SEO Description, type: text }
      - { name: hero_title, label: Hero Title, type: string }
      - { name: hero_subtitle, label: Hero Subtitle, type: string }
      - { name: hero_image, label: Hero Image, type: image }

  # ============================================================
  # BOOKING FORM SETTINGS
  # ============================================================
  - name: leads
    label: Booking Form
    type: file
    path: content/leads.json
    fields:
      - { name: endpoint, label: API Endpoint, type: string }
      - { name: successMessage, label: Success Message, type: text }
      - { name: fallbackMessage, label: Fallback Message, type: text }
      - { name: submitLabel, label: Submit Button Text, type: string }

  # ============================================================
  # FLEET - YACHT COLLECTION
  # ============================================================
  - name: fleet
    label: Our Fleet
    type: collection
    path: content/fleet
    filename: "{fields.slug}.json"
    fields:
      - { name: name, label: Yacht Name, type: string }
      - { name: slug, label: URL Slug, type: string }
      - { name: order, label: Display Order, type: number }
      - { name: type, label: Yacht Type, type: string }
      - { name: tagline, label: Tagline, type: string }
      - { name: summary, label: Short Summary, type: text }
      - { name: description, label: Full Description, type: text }
      - { name: capacityDay, label: Day Capacity, type: string }
      - { name: capacityNight, label: Night Capacity, type: string }
      - { name: specType, label: Hull Type, type: string }
      - { name: specLength, label: Length, type: string }
      - { name: specWidth, label: Width, type: string }
      - { name: specMachine, label: Engine, type: string }
      - { name: specFuel, label: Fuel Capacity, type: string }
      - { name: specWater, label: Water Capacity, type: string }
      - { name: specNavigation, label: Navigation System, type: string }
      - { name: facilities, label: Facilities, type: text }
      - { name: activities, label: Activities, type: text }
      - { name: safety, label: Safety Equipment, type: text }
      - { name: included, label: What's Included, type: text }
      - { name: optionalExtras, label: Optional Extras, type: text }
      - { name: pricingNotes, label: Pricing Notes, type: text }
      - { name: paymentPolicy, label: Payment Policy, type: text }
      - { name: cancellationPolicy, label: Cancellation Policy, type: text }
      - { name: image, label: Yacht Image, type: image }
      - { name: isActive, label: Active, type: boolean }
      - { name: isFeatured, label: Featured, type: boolean }
