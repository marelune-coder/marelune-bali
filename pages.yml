# ============================================================
# MARELUNE BALI - Pages CMS Configuration
# ============================================================
# Version: 4.0 - Clean & Stable
# Last Updated: 2026-06-18
# ============================================================

media:
  input: Production-Code/public/uploads
  output: /uploads

content:

  # ============================================================
  # SITE SETTINGS
  # ============================================================
  - name: site
    label: Site Settings
    type: file
    path: Production-Code/content/site.json
    fields:
      - { name: brand, label: Brand Name, type: string }
      - { name: domain, label: Domain, type: string }
      - { name: description, label: Description, type: text }
      - { name: logo, label: Logo, type: image }
      - { name: contact, label: Contact, type: object }
      - { name: nav, label: Navigation, type: object, list: true }
        fields:
          - { name: label, label: Label, type: string }
          - { name: href, label: Href, type: string }
      - { name: socials, label: Social Links, type: object, list: true }
        fields:
          - { name: label, label: Label, type: string }
          - { name: href, label: Href, type: string }
      - { name: heroCategories, label: Hero Categories, type: object, list: true }
        fields:
          - { name: label, label: Label, type: string }
          - { name: caption, label: Caption, type: string }
      - { name: ticker, label: Footer Ticker, type: string, list: true }
      - { name: seoKeywords, label: SEO Keywords, type: text }

  # ============================================================
  # DESIGN SETTINGS
  # ============================================================
  - name: design
    label: Design Settings
    type: file
    path: Production-Code/content/design.json
    fields:
      - { name: colors, label: Colors, type: object }
      - { name: typography, label: Typography, type: object }
      - { name: visualDefaults, label: Visual Defaults, type: object }

  # ============================================================
  # HOME PAGE
  # ============================================================
  - name: home
    label: Home Page
    type: file
    path: Production-Code/content/pages/home.json
    fields:
      - { name: title, label: SEO Title, type: string }
      - { name: description, label: SEO Description, type: text }
      - { name: hero, label: Hero, type: object }
      - { name: trust, label: Trust Bar, type: object }
      - { name: intro, label: Intro, type: object }
      - { name: stats, label: Stats, type: object, list: true }
      - { name: journeySection, label: Journey Section, type: object }
      - { name: stepsSection, label: Steps Section, type: object }
      - { name: steps, label: Steps, type: object, list: true }
        fields:
          - { name: number, label: Number, type: string }
          - { name: title, label: Title, type: string }
          - { name: text, label: Text, type: text }
      - { name: servicesSection, label: Services Section, type: object }
      - { name: services, label: Services, type: object, list: true }
        fields:
          - { name: category, label: Category, type: string }
          - { name: kicker, label: Kicker, type: string }
          - { name: title, label: Title, type: string }
          - { name: text, label: Text, type: text }
          - { name: image, label: Image, type: image }
          - { name: ctaLabel, label: CTA Label, type: string }
          - { name: ctaHref, label: CTA Link, type: string }
          - { name: meta, label: Meta, type: object, list: true }
            fields:
              - { name: label, label: Label, type: string }
              - { name: value, label: Value, type: string }
      - { name: whySection, label: Why Section, type: object }
      - { name: why, label: Why Items, type: object, list: true }
        fields:
          - { name: title, label: Title, type: string }
          - { name: text, label: Text, type: text }
          - { name: image, label: Image, type: image }
      - { name: testimonialsSection, label: Testimonials Section, type: object }
      - { name: testimonials, label: Testimonials, type: object, list: true }
        fields:
          - { name: quote, label: Quote, type: text }
          - { name: name, label: Name, type: string }
          - { name: role, label: Role, type: string }
          - { name: image, label: Image, type: image }
      - { name: journalSection, label: Journal Section, type: object }
      - { name: faqSection, label: FAQ Section, type: object }
      - { name: faq, label: FAQ Items, type: object, list: true }
        fields:
          - { name: question, label: Question, type: string }
          - { name: answer, label: Answer, type: text }
      - { name: newsletter, label: Newsletter, type: object }

  # ============================================================
  # ABOUT PAGE
  # ============================================================
  - name: about
    label: About Page
    type: file
    path: Production-Code/content/pages/about.json
    fields:
      - { name: title, label: SEO Title, type: string }
      - { name: description, label: SEO Description, type: text }
      - { name: hero, label: Hero, type: object }
      - { name: story, label: Story, type: object }
      - { name: team, label: Team, type: object, list: true }
        fields:
          - { name: name, label: Name, type: string }
          - { name: role, label: Role, type: string }
      - { name: faq, label: FAQ, type: object, list: true }
        fields:
          - { name: question, label: Question, type: string }
          - { name: answer, label: Answer, type: text }

  # ============================================================
  # BOOKING PAGE
  # ============================================================
  - name: book
    label: Booking Page
    type: file
    path: Production-Code/content/pages/book.json
    fields:
      - { name: title, label: SEO Title, type: string }
      - { name: description, label: SEO Description, type: text }
      - { name: hero, label: Hero, type: object }

  # ============================================================
  # BOOKING FORM & LEADS
  # ============================================================
  - name: leads
    label: Booking Form
    type: file
    path: Production-Code/content/leads.json
    fields:
      - { name: endpoint, label: API Endpoint, type: string }
      - { name: successMessage, label: Success Message, type: text }
      - { name: fallbackMessage, label: Fallback Message, type: text }
      - { name: submitLabel, label: Submit Button Text, type: string }
      - { name: fields, label: Form Fields, type: object, list: true }
        fields:
          - { name: name, label: Field Name, type: string }
          - { name: label, label: Label, type: string }
          - { name: type, label: Type, type: select, options: [text, email, tel, number, date, textarea, select] }
          - { name: required, label: Required, type: boolean }
          - { name: placeholder, label: Placeholder, type: string }
          - { name: optionsFrom, label: Options Source, type: select, options: [none, journeys] }
          - { name: extraOptions, label: Extra Options, type: object, list: true }
            fields:
              - { name: label, label: Label, type: string }
              - { name: value, label: Value, type: string }
      - { name: crmColumns, label: CRM Columns, type: string, list: true }
      - { name: statusOptions, label: Status Options, type: string, list: true }

  # ============================================================
  # JOURNEYS
  # ============================================================
  - name: journeys
    label: Journeys
    type: collection
    path: Production-Code/content/journeys
    filename: "{fields.slug}.json"
    fields:
      - { name: title, label: Title, type: string }
      - { name: slug, label: Slug, type: string }
      - { name: order, label: Display Order, type: number }
      - { name: location, label: Location, type: string }
      - { name: summary, label: Summary, type: text }
      - { name: description, label: Description, type: text }
      - { name: price, label: Price, type: string }
      - { name: duration, label: Duration, type: string }
      - { name: idealFor, label: Ideal For, type: string }
      - { name: transport, label: Transport, type: string }
      - { name: image, label: Image, type: image }
      - { name: highlights, label: Highlights, type: string, list: true }

  # ============================================================
  # JOURNAL ARTICLES
  # ============================================================
  - name: blog
    label: Journal Articles
    type: collection
    path: Production-Code/content/blog
    filename: "{fields.slug}.md"
    fields:
      - { name: title, label: Title, type: string }
      - { name: slug, label: Slug, type: string }
      - { name: description, label: Meta Description, type: text }
      - { name: targetKeyword, label: Primary Keyword, type: string }
      - { name: secondaryKeywords, label: Secondary Keywords, type: text }
      - { name: date, label: Publish Date, type: date }
      - { name: updated, label: Updated Date, type: date }
      - { name: category, label: Category, type: string }
      - { name: readingTime, label: Reading Time, type: string }
      - { name: thumbnail, label: Thumbnail, type: image }
      - { name: keywordInTitle, label: SEO: Keyword in Title, type: boolean }
      - { name: keywordInFirst100, label: SEO: Keyword in First 100 Words, type: boolean }
      - { name: hasInternalLinks, label: SEO: Has Internal Links, type: boolean }
      - { name: hasExternalLinks, label: SEO: Has External Links, type: boolean }
      - { name: hasImages, label: SEO: Has Images, type: boolean }
      - { name: minWordCount, label: SEO: Min 800 Words, type: boolean }
      - { name: hasFaq, label: SEO: Has FAQ Section, type: boolean }
      - { name: body, label: Content, type: rich-text }
